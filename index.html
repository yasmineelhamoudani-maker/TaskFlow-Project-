<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestion de Tâches SMI S4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px; background-color: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #059669; }

        .task-list { margin-top: 30px; }
        .task-item { background: #fff; border-left: 5px solid #10b981; padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .task-info h3 { margin: 0; font-size: 18px; }
        .task-info p { margin: 5px 0 0; color: #666; font-size: 14px; }
        .delete-btn { background: #ef4444; padding: 8px 12px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>TaskFlow Project 📝 
    <div style="position: relative; display: inline-block;">
        🔔
        <span id="notification-badge" style="
            position: absolute;
            top: -8px;
            right: -8px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            display: none;
        ">0</span>
    </div>
</h1>
        
        <div class="form-group">
            <input type="text" id="taskTitle" placeholder="Titre de la tâche (ex: Révision JS)">
            <textarea id="taskDesc" placeholder="Description de la tâche..."></textarea>
            <button onclick="addTask()">Ajouter la Tâche</button>
        </div>

        <hr>
        <!-- F7 - Formulaire brouillon -->
<div class="form-group" id="task-form">
    <h3>Nouvelle Tâche</h3>
    <input type="text" id="task-title" placeholder="Titre de la tâche...">
    <select id="task-priority">
        <option value="basse">Basse</option>
        <option value="moyenne">Moyenne</option>
        <option value="haute">Haute</option>
    </select>
    <button onclick="initTaskForm('project123')">Sauvegarder</button>
</div>

        <div id="taskList" class="task-list">
            <p style="text-align:center;">Chargement des tâches...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
