<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestion de Tâches SMI S4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        
        /* Dashboard Stats  */
        .dashboard-stats { display: flex; gap: 10px; margin-bottom: 25px; text-align: center; }
        .stat-card { flex: 1; padding: 12px; border-radius: 8px; }
        .stat-card span { font-size: 12px; font-weight: 500; }
        .stat-card h2 { margin: 5px 0 0 0; font-size: 24px; }

        /* Formulaire  */
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; }
        
        /* Buttons */
        button { padding: 12px; background-color: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #059669; }
        .delete-btn { background: #ef4444; padding: 8px 12px; font-size: 12px; border-radius: 4px; color: white; cursor: pointer; border: none; }
        .delete-btn:hover { background: #dc2626; }

        /* Task List */
        .task-list { margin-top: 30px; }
        .task-item { background: #fff; border-left: 5px solid #10b981; padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .task-info h3 { margin: 0; font-size: 18px; color: #2c3e50; }
        .task-info p { margin: 5px 0 0; color: #666; font-size: 14px; }

        /* Badge Notifications */
        #notification-badge { background: #ef4444; color: white; padding: 2px 6px; border-radius: 50%; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>TaskFlow Project 📝 <span id="notification-badge" style="display: none;"></span></h1>
        
        <div class="dashboard-stats">
            <div class="stat-card" style="background: #e0f2fe;">
                <span style="color: #0369a1;">Total</span>
                <h2 id="statTotal" style="color: #0284c7;">0</h2>
            </div>
            <div class="stat-card" style="background: #dcfce7;">
                <span style="color: #15803d;">Complétées</span>
                <h2 id="statCompleted" style="color: #16a34a;">0</h2>
            </div>
            <div class="stat-card" style="background: #fef3c7;">
                <span style="color: #b45309;">En cours</span>
                <h2 id="statPending" style="color: #d97706;">0</h2>
            </div>
        </div>

        <div class="form-group" id="task-form">
            <input type="text" id="taskTitle" placeholder="Titre de la tâche (ex: Révision JS)">
            <textarea id="taskDesc" placeholder="Description de la tâche..."></textarea>
            
            <input type="hidden" id="task-priority" value="moyenne"> 
            
            <button onclick="addTask()">Ajouter la Tâche</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div id="taskList" class="task-list">
            <p style="text-align:center; color: #888;">Chargement des tâches...</p>
        </div>

        <div class="history-container" style="margin-top: 30px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px dashed #cbd5e1;">
            <h3 style="font-size: 14px; color: #475569; margin: 0 0 10px 0; font-weight: 600;">📜 Historique des activités</h3>
            <div id="activityLog" style="display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; font-size: 13px; color: #64748b;">
                <div style="font-style: italic; color: #94a3b8;">Aucune activité enregistrée.</div>
            </div>
        </div>

    </div>

    <script src="script.js?v=final" defer></script>
    
    <script src="features.js?v=final" defer></script>

</body>
</html>
