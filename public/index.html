<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Gestion de Tâches & Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        
        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        
        .left-panel {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .right-panel {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1, h2 {
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .dashboard-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .stat-card {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }
        .stat-card.total { background-color: #e0f2fe; color: #0369a1; }
        .stat-card.completed { background-color: #dcfce7; color: #15803d; }
        .stat-card.pending { background-color: #fef9c3; color: #a16207; }

        .stat-card span { font-size: 13px; display: block; margin-bottom: 5px; }
        .stat-card h2 { margin: 0; font-size: 28px; color: inherit; }

        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        textarea { resize: vertical; min-height: 80px; }

        button.btn-block {
            width: 100%;
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.btn-block:hover { background-color: #059669; }

        
        .task-list {
            margin-top: 20px;
        }

        
        .historical-section {
            margin-top: 30px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 20px;
        }
        .historical-list {
            max-height: 200px;
            overflow-y: auto;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="left-panel">
            <h1>📋 TaskFlow Project</h1>
            
            <div class="form-group">
                <input type="text" id="taskTitle" placeholder="Nouvelle tâche...">
                <textarea id="taskDesc" placeholder="Description de la tâche..."></textarea>
                <button onclick="addTask()" class="btn-block">Ajouter la Tâche</button>
            </div>

            <div id="taskList" class="task-list">
                <div style="color: #888; text-align: center;">Chargement des tâches...</div>
            </div>
        </div>

        <div class="right-panel">
            <h2>📊 Tableau de Bord</h2>
            
            <div class="dashboard-stats">
                <div class="stat-card total">
                    <span>Total</span>
                    <h2 id="statTotal">0</h2>
                </div>
                <div class="stat-card completed">
                    <span>Complétées</span>
                    <h2 id="statCompleted">0</h2>
                </div>
                <div class="stat-card pending">
                    <span>En cours</span>
                    <h2 id="statPending">0</h2>
                </div>
            </div>

            <div class="historical-section">
                <h3>📜 Historique des activités</h3>
                <div id="activityLog" class="historical-list">
                    <div style="font-style: italic; color: #94a3b8;">Aucune activité enregistrée.</div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
