<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inviter un membre - TaskFlow</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .invite-container {
            max-width: 450px;
            width: 100%;
            padding: 30px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #ccc;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit {
            background-color: #00b894;
            color: white;
        }
        .btn-submit:hover {
            background-color: #00a884;
        }
        .btn-back {
            background-color: #636e72;
            color: white;
            text-align: center;
            text-decoration: none;
        }
        .btn-back:hover {
            background-color: #2d3436;
        }
        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="invite-container">
    <h2>Inviter un membre par Email</h2>
    <form id="inviteForm">
        <div class="form-group">
            <label>Email du membre :</label>
            <input type="email" id="inviteEmail" required placeholder="Ex: collaborateur@taskflow.com">
        </div>
        <div class="form-group">
            <label>Projet associé :</label>
            <select id="projectSelect" required>
                <option value="">-- Choisir un projet --</option>
                <option value="TaskFlow App">TaskFlow Project</option>
            </select>
        </div>
        <div class="btn-group">
            <a href="/index.html" class="btn-back" style="display: flex; justify-content: center; align-items: center;">Retour</a>
            <button type="submit" class="btn-submit">Envoyer l'invitation</button>
        </div>
    </form>
    <div id="message" class="message"></div>
</div>

<script>
    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('inviteEmail').value;
        const project = document.getElementById('projectSelect').value;
        const messageDiv = document.getElementById('message');
        
        const token = localStorage.getItem('token');

        messageDiv.style.color = 'blue';
        messageDiv.innerText = "Envoi de l'invitation en cours...";

        try {
            const response = await fetch('http://localhost:5000/api/projects/invite', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-auth-token': token 
                },
                body: JSON.stringify({ email, project })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = '✅ Invitation envoyée avec succès par Email !';
                document.getElementById('inviteForm').reset();
            } else {
                messageDiv.style.color = 'red';
                messageDiv.innerText = '❌ Échec : ' + (data.msg || "Erreur lors de l'envoi");
            }
        } catch (err) {
            messageDiv.style.color = 'red';
            messageDiv.innerText = '❌ Erreur de connexion au serveur';
        }
    });
</script>

</body>
</html>
